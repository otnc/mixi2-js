syntax = "proto3";

package social.mixi.application.model.v1;

import "google/protobuf/timestamp.proto";
import "social/mixi/application/const/v1/post_access_level.proto";
import "social/mixi/application/const/v1/post_mask_type.proto";
import "social/mixi/application/const/v1/post_media_type.proto";
import "social/mixi/application/const/v1/post_visibility.proto";
import "social/mixi/application/model/v1/media.proto";

message Post {
  string post_id = 1;
  bool is_deleted = 2;
  string creator_id = 3;
  string text = 4;
  google.protobuf.Timestamp created_at = 5;
  repeated PostMedia post_media_list = 6;
  optional string in_reply_to_post_id = 7;
  optional PostMask post_mask = 8;
  optional string community_id = 9;
  const.v1.PostVisibility visibility = 10;
  const.v1.PostAccessLevel access_level = 11;
  repeated PostStamp stamps = 12;
  optional string reader_stamp_id = 13;
}

message PostMedia {
  const.v1.PostMediaType media_type = 1;
  oneof content {
    PostMediaImage image = 2;
    PostMediaVideo video = 3;
  }
}

message PostMediaImage {
  string large_image_url = 1;
  string large_image_mime_type = 2;
  uint32 large_image_height = 3;
  uint32 large_image_width = 4;
  string small_image_url = 5;
  string small_image_mime_type = 6;
  uint32 small_image_height = 7;
  uint32 small_image_width = 8;
}

message PostMediaVideo {
  string video_url = 1;
  string video_mime_type = 2;
  uint32 video_height = 3;
  uint32 video_width = 4;
  string preview_image_url = 5;
  string preview_image_mime_type = 6;
  uint32 preview_image_height = 7;
  uint32 preview_image_width = 8;
  float duration = 9;
}

message PostMask {
  const.v1.PostMaskType mask_type = 1;
  string caption = 2;
}

message PostStamp {
  MediaStamp stamp = 1;
  uint64 count = 2;
}
